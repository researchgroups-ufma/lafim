# =============================================================================
# config.yml — Configuração do Decap CMS
#
# A autenticação usa Cloudflare Functions como proxy OAuth para o GitHub.
# As funções ficam em functions/auth.js e functions/callback.js.
#
# Variáveis necessárias no Cloudflare Pages (Settings > Environment variables):
#   GITHUB_CLIENT_ID
#   GITHUB_CLIENT_SECRET
# =============================================================================

backend:
  name: github
  repo: researchgroups-ufma/lafim
  branch: main          # branch que o CMS vai commitar
  base_url: https://decap-proxy.and-near.workers.dev # URL base para o proxy OAuth
  auth_endpoint: /auth          # rota da Cloudflare Function de autenticação

media_folder: public/uploads
public_folder: /uploads
locale: pt

collections:

  # ── Apresentação ────────────────────────────────────────────────────────────
  - name: "about"
    label: "Apresentação"
    files:
      - name: "about"
        label: "Texto Institucional"
        file: "content/about/index.md"
        fields:
          - { label: "Título",         name: "title",       widget: "string" }
          - { label: "Subtítulo",      name: "subtitle",    widget: "string",   required: false }
          - { label: "Missão",         name: "mission",     widget: "text" }
          - { label: "Histórico",      name: "body",        widget: "markdown" }
          - label: "Imagens do Hero (carrossel)"
            name: "hero_images"
            widget: "list"
            required: false
            field: { label: "Imagem", name: "image", widget: "image" }

  # ── Membros ─────────────────────────────────────────────────────────────────
  - name: "members"
    label: "Membros"
    folder: "content/members"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nome completo",      name: "title",         widget: "string" }
      - label: "Função"
        name: "role"
        widget: "select"
        options: ["Coordenador", "Pesquisador Sênior", "Pós-Doutorando", "Doutorando", "Mestrando", "Iniciação Científica", "Egresso", "Colaborador Externo"]
      - { label: "Afiliação",          name: "affiliation",   widget: "string" }
      - { label: "Bio",                name: "bio",           widget: "text" }
      - { label: "Foto",               name: "photo",         widget: "image",   required: false }
      - { label: "E-mail",             name: "email",         widget: "string",  required: false }
      - { label: "Lattes",             name: "lattes",        widget: "string",  required: false }
      - { label: "ORCID",              name: "orcid",         widget: "string",  required: false }
      - { label: "Google Scholar",     name: "scholar",       widget: "string",  required: false }
      - { label: "arXiv",              name: "arxiv",         widget: "string",  required: false }
      - { label: "Linha de pesquisa",  name: "research_area", widget: "string",  required: false }
      - label: "Bolsa"
        name: "scholarship"
        widget: "select"
        required: false
        options: ["CAPES", "CNPq", "FAPEMA", "Sem bolsa"]
      - { label: "Ano de início",               name: "year_start", widget: "string", required: false }
      - { label: "Ano de conclusão (egressos)", name: "year_end",   widget: "string", required: false }
      - { label: "Instituição atual (egressos)", name: "current_institution", widget: "string", required: false }

  # ── Linhas de Pesquisa ──────────────────────────────────────────────────────
  - name: "research"
    label: "Linhas de Pesquisa"
    folder: "content/research"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nome",               name: "title",   widget: "string" }
      - { label: "Resumo curto",       name: "summary", widget: "text" }
      - { label: "Descrição completa", name: "body",    widget: "markdown" }
      - { label: "Imagem",             name: "image",   widget: "image",    required: false }

  # ── Publicações ─────────────────────────────────────────────────────────────
  - name: "publications"
    label: "Publicações"
    folder: "content/publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "Título",             name: "title",         widget: "string" }
      - { label: "Autores",            name: "authors",       widget: "string" }
      - { label: "Ano",                name: "year",          widget: "number" }
      - { label: "Periódico",          name: "journal",       widget: "string",  required: false }
      - { label: "DOI",                name: "doi",           widget: "string",  required: false }
      - { label: "arXiv ID",           name: "arxiv",         widget: "string",  required: false }
      - label: "Tipo"
        name: "type"
        widget: "select"
        options: ["Artigo", "Preprint", "Tese", "Dissertação", "Livro", "Capítulo"]
      - { label: "Linha de pesquisa",  name: "research_area", widget: "string",  required: false }
      - label: "Tags para filtro"
        name: "tags"
        widget: "select"
        required: false
        multiple: true
        options:
          - { label: "Mat. Condensada",    value: "mat" }
          - { label: "Supercondutividade", value: "supercond" }
          - { label: "Nanomateriais",      value: "nano" }
          - { label: "Computacional",      value: "comp" }
      - { label: "Em destaque",        name: "featured",      widget: "boolean", default: false }

  # ── Notícias ────────────────────────────────────────────────────────────────
  - name: "news"
    label: "Notícias"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Título",         name: "title",       widget: "string" }
      - { label: "Data",           name: "date",        widget: "datetime" }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options: ["Publicação", "Defesa", "Premiação", "Visita", "Mídia", "Outros"]
      - { label: "Resumo",         name: "excerpt",     widget: "text" }
      - { label: "Conteúdo",       name: "body",        widget: "markdown" }
      - { label: "Imagem de capa", name: "cover_image", widget: "image",   required: false }

  # ── Infraestrutura ──────────────────────────────────────────────────────────
  - name: "equipment-info"
    label: "Infraestrutura — Informações da Página"
    files:
      - name: "equipment-info"
        label: "Texto Introdutório"
        file: "content/equipment/index.md"
        fields:
          - { label: "Introdução da página", name: "intro", widget: "text" }

  - name: "equipment"
    label: "Infraestrutura — Equipamentos"
    folder: "content/equipment"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nome do equipamento",    name: "title",        widget: "string" }
      - { label: "Descrição breve",        name: "summary",      widget: "text" }
      - { label: "Descrição completa",     name: "description",  widget: "markdown", required: false }
      - { label: "Foto",                   name: "photo",        widget: "image",    required: false }
      - { label: "Fabricante",             name: "manufacturer", widget: "string",   required: false }
      - { label: "Modelo",                 name: "model",        widget: "string",   required: false }

  # ── Destaques da Homepage ────────────────────────────────────────────────────
  - name: "highlights"
    label: "Destaques da Homepage"
    folder: "content/highlights"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título",              name: "title",          widget: "string" }
      - { label: "Descrição",           name: "description",    widget: "text" }
      - { label: "Imagem",              name: "image",          widget: "image",  required: false }
      - { label: "Legenda da imagem",   name: "image_caption",  widget: "string", required: false }
      - label: "Posição da imagem"
        name: "image_position"
        widget: "select"
        default: "right"
        options:
          - { label: "Direita", value: "right" }
          - { label: "Esquerda", value: "left" }
      - { label: "Ordem de exibição",   name: "order",          widget: "number", default: 1 }    